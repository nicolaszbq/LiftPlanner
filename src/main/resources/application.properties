spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/exerciseworksheet}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.application.name=ExerciseWorksheetManager
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
# Use SPRING_PROFILES_ACTIVE in Render if necessário, ou remova para usar o profile padrão.
# spring.profiles.active=${SPRING_PROFILES_ACTIVE:}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
api.security.secret=${API_SECURITY_SECRET:ChangeMeInProdOnRender}